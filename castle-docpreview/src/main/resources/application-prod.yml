server:
  port: 8302

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}  # 建议直接引用环境变量，确保与Koyeb设置完全一致
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus  # 用逗号分隔
      base-path: /actuator
  endpoint:
    health:
      enabled: true
      show-details: always  # 修正属性名
    metrics:
      enabled: true  # 注意是复数，且缩进与health同级
    prometheus:
      enabled: true  # 修正单词拼写
