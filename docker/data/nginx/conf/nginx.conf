
user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;


    keepalive_timeout  65;

    #gzip  on;

    #include /etc/nginx/conf.d/*.conf;
    map $http_upgrade $connection_upgrade {
        default          keep-alive;  # 默认 keep-alive，表示HTTP协议。
        'websocket'      upgrade;     # 若是 websocket 请求，则升级协议 upgrade。
    }
	proxy_cache off;  # 关闭代理缓存
    fastcgi_cache off;
    uwsgi_cache off;
    scgi_cache off;

	server
	{
	    listen 80 ;
	    server_name localhost;
	    index index.php index.html index.htm default.php default.htm default.html;
	    try_files $uri $uri/ /index.html;
	    root /usr/share/nginx/html/;
        location /static/ {
            proxy_pass http://knowledgebase:8200/zsk/static/;
            client_max_body_size 1024m;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header Server;
            # 移除下面两行，避免干扰缓存和传输编码
            # proxy_hide_header Content-Length;
            # proxy_hide_header Transfer-Encoding;
            proxy_set_header Connection '';
            chunked_transfer_encoding on;
            # 添加缓存控制头
            add_header Cache-Control 'public, max-age=31536000' always;
            expires 1y;

		}
		location /api/ {
			proxy_pass http://knowledgebase:8200/zsk/;
			client_max_body_size 1024m; # 将此路由请求的实体大小限制为1024m
			proxy_http_version 1.1;
            # 禁用Nginx的缓冲机制
            proxy_buffering off;
            # 将原始请求头发送给后端
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # 不修改任何响应头
            proxy_pass_header Server;
            proxy_hide_header Content-Length;
            proxy_hide_header Transfer-Encoding;
            # 确保连接保持开启
            proxy_set_header Connection "Connection=close";
            # 确保分块传输编码被正确处理
            chunked_transfer_encoding on;

		}

		location /upload/ {
      		alias /data/knowledgebase/upload/;
     		 index index.html index.htm;
    	}

	    access_log  /etc/nginx/knowledge.log;
	    error_log  /etc/nginx/knowledge.error.log;
	}


}
